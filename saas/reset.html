  <script src="config.example.js"></script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FuneralOS — Αλλαγή κωδικού</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1523;color:#fff;line-height:1.7;margin:0;padding:32px}main{max-width:820px;margin:auto;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:28px}a{color:#c8a96e}h1{line-height:1.15}li{margin:8px 0}.muted{color:#9aa6bd}</style></head><body><main><h1>Αλλαγή κωδικού</h1><p class="muted">Βάλε νέο κωδικό.</p><input id="p" type="password" placeholder="New password" style="width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#fff"><button onclick="go()" style="margin-top:14px;padding:14px 18px;border:0;border-radius:12px;background:#c8a96e;font-weight:800">Αποθήκευση κωδικού</button><p id="m"></p><p><a href="login.html">Πίσω στη σύνδεση</a></p></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>const sb=supabase.createClient('https://jciaozbyvdiqfxwlgdql.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjaWFvemJ5dmRpcWZ4d2xnZHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUxMTE5NjQsImV4cCI6MjA4MDY4Nzk2NH0.eEBYVU1VTU3CZvaSA9fh-LLEbqRPRY9ZpK7P-17kWaA');async function go(){const password=document.getElementById('p').value;if(password.length<6){m.textContent='Minimum 6 characters.';return}const {error}=await sb.auth.updateUser({password});m.textContent=error?error.message:'Password updated. You can sign in now.'}</script></body></html>
